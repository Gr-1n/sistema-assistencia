{% extends "oficina/base.html" %}

{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">

                <h3 class="text-center mb-4">
                    🛠 Assistência Técnica
                </h3>

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}

                    {% if form.errors %}
                    <div class="alert alert-danger p-2" style="font-size: 0.9rem;">
                        Usuário ou senha inválidos
                    </div>
                    {% endif %}

                    <div class="row mb-3 align-items-center">
                        <label class="col-3 form-label mb-0 text-end">Usuário</label>
                        <div class="col-9">
                            {{ form.username }}
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <label class="col-3 form-label mb-0 text-end">Senha</label>
                        <div class="col-9">
                            {{ form.password }}
                        </div>
                    </div>

                    <div class="row mt-4">
                        <div class="col-9 offset-3">
                            <button type="submit" class="btn btn-dark w-100">
                                Entrar
                            </button>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

<style>
    /* Garante que o Django renderize os inputs com a classe do Bootstrap */
    input {
        display: block;
        width: 100%;
        padding: 0.375rem 0.75rem;
        font-size: 1rem;
        font-weight: 400;
        line-height: 1.5;
        color: #212529;
        background-color: #fff;
        background-clip: padding-box;
        border: 1px solid #ced4da;
        appearance: none;
        border-radius: 0.375rem;
        transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
    }
</style>

{% endblock %}

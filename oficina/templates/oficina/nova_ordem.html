{% extends "oficina/base.html" %}

{% block title %}
Nova Ordem de Serviço
{% endblock %}

{% block content %}

<h2 class="mb-4">Nova Ordem de Serviço</h2>

<form method="POST" class="card p-4 shadow-sm">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Cliente</label>

<select name="cliente" class="form-select">

{% for cliente in clientes %}
<option value="{{ cliente.id }}">
{{ cliente.nome }}
</option>
{% endfor %}

</select>
</div>


<div class="mb-3">
<label class="form-label">Equipamento</label>

<select name="equipamento" class="form-select">

{% for equipamento in equipamentos %}
<option value="{{ equipamento.id }}">
{{ equipamento.marca }} {{ equipamento.modelo }}
</option>
{% endfor %}

</select>
</div>


<div class="mb-3">
<label class="form-label">Problema relatado</label>
<textarea name="problema" class="form-control" rows="3"></textarea>
</div>


<div class="mb-3">
<label class="form-label">Diagnóstico</label>
<textarea name="diagnostico" class="form-control" rows="3"></textarea>
</div>


<div class="mb-3">
<label class="form-label">Valor do serviço</label>

<div class="input-group">
<span class="input-group-text">R$</span>

<input 
type="number"
step="0.01"
name="valor"
id="valor"
class="form-control"
placeholder="0,00">

</div>
</div>


<div class="mb-3">
<label class="form-label">Status</label>

<select name="status" class="form-select">

<option value="recebido">Recebido</option>
<option value="diagnostico">Diagnóstico</option>
<option value="aprovacao">Aguardando aprovação</option>
<option value="reparo">Em reparo</option>
<option value="finalizado">Finalizado</option>
<option value="entregue">Entregue</option>
<option value="cancelado">Cancelado</option>

</select>

</div>

<div class="mt-3">

<button type="submit" class="btn btn-success">
Salvar
</button>

<a href="/ordens/" class="btn btn-secondary ms-2">
Voltar
</a>

</div>

</form>

<script>

document.getElementById("valor").addEventListener("blur", function() {

let valor = parseFloat(this.value);

if (!isNaN(valor)) {
this.value = valor.toFixed(2);
}

});

</script>

{% endblock %}

{% extends 'oficina/base.html' %}

{% block content %}

<h1>Clientes</h1>

<a href="/clientes/novo/" class="btn btn-success mb-3">

Novo Cliente

</a>

<table class="table table-striped">

<tr>

<th>Nome</th>
<th>Telefone</th>
<th>Email</th>
<th>Endereço</th>

</tr>

{% for cliente in clientes %}

<tr>

<td>{{ cliente.nome }}</td>
<td>{{ cliente.telefone }}</td>
<td>{{ cliente.email }}</td>
<td>{{ cliente.endereco }}</td>

</tr>

{% endfor %}

</table>

{% endblock %}

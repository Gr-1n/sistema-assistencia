{% extends "oficina/base.html" %}

{% block title %}
Editar Cliente
{% endblock %}

{% block content %}

<h2 class="mb-4">Editar Cliente</h2>

<form method="POST" class="card p-4 shadow-sm">

{% csrf_token %}

<div class="mb-3">
<label class="form-label">Nome</label>
<input type="text" name="nome" value="{{ cliente.nome }}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Telefone</label>
<input type="text" name="telefone" value="{{ cliente.telefone }}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" value="{{ cliente.email }}" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Endereço</label>
<input type="text" name="endereco" value="{{ cliente.endereco }}" class="form-control">
</div>

<div class="mt-3">

<button type="submit" class="btn btn-success">
Salvar Cliente
</button>

<a href="/clientes/" class="btn btn-secondary ms-2">
Voltar
</a>

</div>

</form>

{% endblock %}
